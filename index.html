<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Defense-in-depth: a static, self-contained game. Allow only same-origin
       scripts/styles, no inline scripts or event handlers (blocks injected
       onerror=/onclick= style XSS), and no outbound connections. 'unsafe-inline'
       is needed for style-src only because the UI sets inline width styles on
       progress bars; script-src stays strict. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" />
  <meta name="referrer" content="no-referrer" />
  <meta name="description" content="GOBLIN — a lightweight idle game about a goblin who grows, builds, and gets up to shenanigans." />
  <title>GOBLIN — a tale of growth &amp; shenanigans</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header id="hdr"></header>

    <main id="grid">
      <section class="col">
        <div class="panel" id="resources"></div>
        <div class="panel" id="goblins"></div>
        <div class="panel" id="notables"></div>
        <div class="panel" id="actions"></div>
      </section>

      <section class="col">
        <div class="panel" id="build"></div>
        <div class="panel" id="destiny"></div>
        <div class="panel" id="standing"></div>
        <div class="panel" id="annals"></div>
      </section>

      <section class="col wide">
        <div class="panel tall" id="chronicle"></div>
      </section>
    </main>

    <footer id="foot">
      <span class="fnote">autosaves to this browser · text-based idle game</span>
      <span class="fctrl">
        <button class="link" data-act="export">export save</button>
        <button class="link" data-act="import">import save</button>
        <button class="link danger" data-act="hardreset">abandon &amp; restart</button>
      </span>
    </footer>
  </div>

  <div id="modal"></div>
  <div id="start"></div>

  <!-- juice overlays: floating gains + milestone fanfares (filled by ui.js) -->
  <div id="fx" aria-hidden="true"></div>
  <div id="banners" aria-hidden="true"></div>

  <!-- plain scripts (no modules) so it also runs from file:// -->
  <script src="js/data.js"></script>
  <script src="js/story.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
